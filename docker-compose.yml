services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: handoutdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: pgvector
      DB_PORT: 5432
    depends_on:
      - pgvector
    restart: unless-stopped
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface

volumes:
  pgdata:
  hf_cache:
